name: PR

# Catches every regression class the cleanup pass shipped fixes for:
#  - Rust workspace doesn't build
#  - Crate unit tests regress
#  - clippy lints land
#  - frontend TypeScript types drift
#  - frontend build fails (Vite + tsc -b)
#
# Runs on every PR + every push to main so a direct push (rare; we
# normally branch + PR) still gets validated.
on:
  pull_request:
  push:
    branches: [main]
  # Manual re-run from the Actions tab when a flake needs a retry.
  workflow_dispatch:

# A second push to the same PR cancels the in-flight run — saves
# minutes when someone pushes a fixup commit while CI is still chewing
# on the previous one.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  # Colour-friendly cargo + rustc output in the GitHub Actions log
  # viewer. `--locked` everywhere ensures CI uses the committed
  # Cargo.lock rather than silently bumping versions.
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Build libghostty.a on macos-15 where the CLT ships MacOSX15.x SDKs
  # with TBD v4 format that Zig 0.15.2 can parse correctly. On macos-26
  # even the MacOSX15.4.sdk in the CLT uses TBD v5+ format, causing Zig
  # to silently emit only ~4 symbols instead of ~97.
  build-ghostty:
    name: build libghostty.a (macos-15)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install mise toolchain (zig 0.15.2)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache zig packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-pkg-macos15-${{ hashFiles('vendor/ghostty/build.zig.zon') }}
          restore-keys: zig-pkg-macos15-

      - name: Cache libghostty.a (macos-15)
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: ~/ghostty-prebuilt
          key: libghostty-macos15-${{ hashFiles('vendor/ghostty/**', 'patches/ghostty/**', 'crates/ghostty-sys/build.rs', 'tools/ghostty-xcrun-shim/**') }}

      - name: Build libghostty.a (zig on macos-15)
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Apply patches to vendor/ghostty (idempotent)
          cd vendor/ghostty
          for patch in ../../patches/ghostty/*.patch; do
            [ -f "$patch" ] || continue
            if git apply -R --check "$patch" 2>/dev/null; then
              echo "Patch already applied: $patch"
            else
              git apply "$patch"
              echo "Applied: $patch"
            fi
          done
          cd ../..

          # Find best Zig-compatible SDK: versioned MacOSX15.x > MacOSX14.x.
          # The generic MacOSX15.sdk symlink is excluded (no digit after the dot).
          SDK_PATH=$(find /Library/Developer/CommandLineTools/SDKs -maxdepth 1 \
            \( -name 'MacOSX15.[0-9]*.sdk' -o -name 'MacOSX14.[0-9]*.sdk' \) \
            -type d 2>/dev/null | sort -r | head -1 || true)
          echo "Selected SDK: ${SDK_PATH:-none}"

          # Verify TBD format of selected SDK
          if [ -n "$SDK_PATH" ]; then
            head -3 "$SDK_PATH/usr/lib/libSystem.tbd" 2>/dev/null || echo "(no libSystem.tbd)"
          fi

          chmod +x tools/ghostty-xcrun-shim/xcrun
          export PATH="$(pwd)/tools/ghostty-xcrun-shim:$PATH"

          ZIG=$(mise which zig)
          INSTALL_DIR="$HOME/ghostty-build"
          mkdir -p "$INSTALL_DIR"

          ZIG_ARGS=(
            build install
            -Dapp-runtime=none
            -Drenderer=metal
            -Dfont-backend=coretext
            -Demit-xcframework=false
            -Doptimize=ReleaseFast
            --prefix "$INSTALL_DIR"
          )

          (
            cd vendor/ghostty
            if [ -n "$SDK_PATH" ]; then
              GHOSTTY_SDK_PATH="$SDK_PATH" SDKROOT="$SDK_PATH" \
              DEVELOPER_DIR="/Library/Developer/CommandLineTools" \
              "$ZIG" "${ZIG_ARGS[@]}"
            else
              "$ZIG" "${ZIG_ARGS[@]}"
            fi
          )

          ranlib "$INSTALL_DIR/lib/libghostty.a"

          mkdir -p "$HOME/ghostty-prebuilt"
          cp "$INSTALL_DIR/lib/libghostty.a" "$HOME/ghostty-prebuilt/libghostty.a"
          ls -lh "$HOME/ghostty-prebuilt/"

          echo "=== ghostty_ symbol count (want ~97) ==="
          nm -gU "$HOME/ghostty-prebuilt/libghostty.a" | grep -c "_ghostty_" || true
          echo "=== first 10 ghostty_ symbols ==="
          nm -gU "$HOME/ghostty-prebuilt/libghostty.a" | grep "_ghostty_" | head -10 || true

      - name: Upload libghostty.a
        uses: actions/upload-artifact@v4
        with:
          name: libghostty-arm64-pr
          path: ~/ghostty-prebuilt/libghostty.a
          if-no-files-found: error
          retention-days: 3

  rust:
    name: Rust workspace
    needs: build-ghostty
    # macos-26 ships Xcode 26 + macOS 26 SDK so the Apple Speech and
    # screen-vocab Swift bridges compile their real implementations
    # (rather than falling back to runtime-stub mode on older SDKs).
    runs-on: macos-26
    steps:
      # `submodules: recursive` fetches `vendor/ghostty` (pinned to a
      # clean upstream tag in `.gitmodules`). Required — bindgen needs
      # `vendor/ghostty/include/ghostty.h` even when GHOSTTY_LIB_DIR
      # skips the Zig build.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Restore cargo registry + git index + target dir between runs.
      # Key on Cargo.lock so a dependency bump invalidates correctly.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Download the libghostty.a built on macos-15 by the build-ghostty job.
      # Setting GHOSTTY_LIB_DIR tells crates/ghostty-sys/build.rs to skip
      # the zig build entirely and link against this prebuilt archive.
      - name: Download libghostty.a (built on macos-15)
        uses: actions/download-artifact@v4
        with:
          name: libghostty-arm64-pr
          path: ~/ghostty-prebuilt

      - name: Set GHOSTTY_LIB_DIR
        run: |
          echo "GHOSTTY_LIB_DIR=$HOME/ghostty-prebuilt" >> "$GITHUB_ENV"
          ls -lh "$HOME/ghostty-prebuilt"

      - name: cargo build --workspace
        run: cargo build --workspace --locked

      - name: cargo test --workspace
        run: cargo test --workspace --locked --lib

      - name: cargo clippy
        run: cargo clippy --workspace --locked -- -D warnings

      # Drift check: re-run the ts-rs export tests, then fail the build
      # if any generated `.ts` file changed vs what's checked in. Forces
      # contributors who touch a `#[derive(TS)]` struct to run the
      # generator + commit the output, instead of merging a backend
      # change that silently breaks the frontend.
      - name: ts-rs binding drift check
        run: |
          cargo test --workspace --locked export_bindings
          if ! git diff --exit-code -- packages/types/src/generated; then
            echo "::error::ts-rs bindings are out of date. Run 'cargo test --workspace export_bindings' locally and commit the result."
            exit 1
          fi

  frontend:
    name: Frontend (TS + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `packageManager: pnpm@<version>` in package.json is what
      # corepack uses to pick the right pnpm version; pnpm/action-setup
      # picks it up automatically with `version: 'package.json'`.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Lint (tsc --noEmit)
        run: pnpm lint

      - name: Build (vite + tsc -b)
        run: pnpm build
