name: Publish npm wrapper

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run npm publish --dry-run (no actual publish)"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for --provenance OIDC attestation

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Compare local vs published version
        id: check
        working-directory: apps/zen-tools-npm
        shell: bash
        run: |
          set -euo pipefail
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @seg4lt/zen-tools version 2>/dev/null || echo "none")
          echo "local=$LOCAL"     >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "Local: $LOCAL"
          echo "Published: $PUBLISHED"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Local version matches published — bump apps/zen-tools-npm/package.json before publishing."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        working-directory: apps/zen-tools-npm
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --provenance --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
