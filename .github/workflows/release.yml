name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Releases publish to this repo (github.repository). No cross-repo
# auth needed — default GITHUB_TOKEN is enough because softprops/
# action-gh-release defaults `repository` to the current repo.
#
# Mirrors the flowstate build pipeline: a `build` matrix job assembles
# the Tauri bundle on each runner, a separate `release` job downloads
# the artifacts and publishes a GitHub Release.

jobs:
  # Build libghostty.a on macos-15 where the CLT ships MacOSX15.x SDKs
  # with TBD v4 format that Zig 0.15.2 can parse correctly. On macos-26
  # even the MacOSX15.4.sdk in the CLT uses TBD v5+ format, causing Zig
  # to silently emit only ~4 symbols instead of ~97.
  build-ghostty:
    name: build libghostty.a (macos-15)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install mise toolchain (zig 0.15.2)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache zig packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-pkg-macos15-${{ hashFiles('vendor/ghostty/build.zig.zon') }}
          restore-keys: zig-pkg-macos15-

      - name: Cache libghostty.a (macos-15)
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: ~/ghostty-prebuilt
          key: libghostty-macos15-${{ hashFiles('vendor/ghostty/**', 'patches/ghostty/**', 'crates/ghostty-sys/build.rs', 'tools/ghostty-xcrun-shim/**') }}

      - name: Build libghostty.a (zig on macos-15)
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Apply patches to vendor/ghostty (idempotent)
          cd vendor/ghostty
          for patch in ../../patches/ghostty/*.patch; do
            [ -f "$patch" ] || continue
            if git apply -R --check "$patch" 2>/dev/null; then
              echo "Patch already applied: $patch"
            else
              git apply "$patch"
              echo "Applied: $patch"
            fi
          done
          cd ../..

          # Find best Zig-compatible SDK: versioned MacOSX15.x > MacOSX14.x.
          # The generic MacOSX15.sdk symlink is excluded (no digit after the dot).
          SDK_PATH=$(find /Library/Developer/CommandLineTools/SDKs -maxdepth 1 \
            \( -name 'MacOSX15.[0-9]*.sdk' -o -name 'MacOSX14.[0-9]*.sdk' \) \
            -type d 2>/dev/null | sort -r | head -1 || true)
          echo "Selected SDK: ${SDK_PATH:-none}"

          # Verify TBD format of selected SDK
          if [ -n "$SDK_PATH" ]; then
            head -3 "$SDK_PATH/usr/lib/libSystem.tbd" 2>/dev/null || echo "(no libSystem.tbd)"
          fi

          chmod +x tools/ghostty-xcrun-shim/xcrun
          export PATH="$(pwd)/tools/ghostty-xcrun-shim:$PATH"

          ZIG=$(mise which zig)
          INSTALL_DIR="$HOME/ghostty-build"
          mkdir -p "$INSTALL_DIR"

          ZIG_ARGS=(
            build install
            -Dapp-runtime=none
            -Drenderer=metal
            -Dfont-backend=coretext
            -Demit-xcframework=false
            -Doptimize=ReleaseFast
            --prefix "$INSTALL_DIR"
          )

          (
            cd vendor/ghostty
            if [ -n "$SDK_PATH" ]; then
              GHOSTTY_SDK_PATH="$SDK_PATH" SDKROOT="$SDK_PATH" \
              DEVELOPER_DIR="/Library/Developer/CommandLineTools" \
              "$ZIG" "${ZIG_ARGS[@]}"
            else
              "$ZIG" "${ZIG_ARGS[@]}"
            fi
          )

          ranlib "$INSTALL_DIR/lib/libghostty.a"

          mkdir -p "$HOME/ghostty-prebuilt"
          cp "$INSTALL_DIR/lib/libghostty.a" "$HOME/ghostty-prebuilt/libghostty.a"
          ls -lh "$HOME/ghostty-prebuilt/"

          echo "=== ghostty_ symbol count (want ~97) ==="
          nm -gU "$HOME/ghostty-prebuilt/libghostty.a" | grep -c "_ghostty_" || true
          echo "=== first 10 ghostty_ symbols ==="
          nm -gU "$HOME/ghostty-prebuilt/libghostty.a" | grep "_ghostty_" | head -10 || true

      - name: Upload libghostty.a
        uses: actions/upload-artifact@v4
        with:
          name: libghostty-arm64
          path: ~/ghostty-prebuilt/libghostty.a
          if-no-files-found: error
          retention-days: 7

  build:
    needs: build-ghostty
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            # macos-26 (Tahoe) image ships Xcode 26 + the macOS 26 SDK,
            # which the Apple Speech (`SpeechAnalyzer`) and screen-vocab
            # (`ScreenCaptureKit` + Vision) Swift bridges require to
            # compile. The previous macos-14 runner only had SDK 14, so
            # the bridges' build.rs's fell back to stubs and Tauri's
            # `bundle.macOS.frameworks` validation aborted with
            # `Library not found: ../target/release/lib*_bridge.dylib`.
            runner: macos-26
            target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
            bundle-subpath: aarch64-apple-darwin/release/bundle

          # - name: windows-x64
          #   runner: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   tauri-args: ""
          #   bundle-subpath: release/bundle

          # - name: linux-x64
          #   runner: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   tauri-args: ""
          #   bundle-subpath: release/bundle

    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pulls `vendor/ghostty` (submodule pinned in `.gitmodules`).
          # Required for bindgen to find `vendor/ghostty/include/ghostty.h`.
          submodules: recursive

      # `packageManager: pnpm@<version>` in package.json is what
      # corepack uses to pick the right pnpm version; pnpm/action-setup
      # picks it up automatically. Specifying `version:` here in
      # addition errors out with `ERR_PNPM_BAD_PM_VERSION` on
      # action-setup@v4.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          # Single workspace at the repo root — `target/` lives here.
          workspaces: . -> target

      # Download the libghostty.a built on macos-15 by the build-ghostty job.
      # Setting GHOSTTY_LIB_DIR tells crates/ghostty-sys/build.rs to skip
      # the zig build entirely and link against this prebuilt archive.
      - name: Download libghostty.a (built on macos-15)
        if: runner.os == 'macOS'
        uses: actions/download-artifact@v4
        with:
          name: libghostty-arm64
          path: ~/ghostty-prebuilt

      - name: Set GHOSTTY_LIB_DIR
        if: runner.os == 'macOS'
        run: |
          echo "GHOSTTY_LIB_DIR=$HOME/ghostty-prebuilt" >> "$GITHUB_ENV"
          ls -lh "$HOME/ghostty-prebuilt"

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Windows: Rust's dependency tree (especially the heavy crates
      # like `notify`, `cargo`, etc.) hits the legacy MAX_PATH limit
      # without long-paths enabled. Mirrors flowstate's Windows step.
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --system core.longpaths true

      - name: Build
        env:
          # Minisign key for the Tauri updater. Tauri signs the macOS
          # `.app.tar.gz` and the Windows `*-setup.exe` automatically
          # when `createUpdaterArtifacts: true` is set in
          # tauri.conf.json (it is). The CI key was generated with
          # `tauri signer generate --ci` (no password), so PASSWORD
          # stays empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Windows-only build env (harmless on macOS — the runners
          # ignore vars the toolchain doesn't recognise):
          #
          # WEBVIEW2_STATIC=1 bundles the WebView2 bootstrapper into
          # the NSIS installer so end users don't need a separate
          # WebView2 download.
          #
          # RUSTFLAGS=-C target-feature=+crt-static statically links
          # the MSVC CRT, producing a self-contained .exe with no
          # VC++ redistributable dependency.
          WEBVIEW2_STATIC: "1"
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}
        # `env -u CI`: some Rust deps' build.rs scripts misbehave when
        # the `CI` env var is set (e.g. fff-search 0.5.2 hard-panics
        # whenever `env::var("CI").is_ok()` regardless of value).
        # GitHub Actions exports CI=true runner-wide; stripping it for
        # this single command picks the same path local dev uses.
        # `shell: bash` is required because `env -u` isn't recognised
        # by the default pwsh on Windows runners — Git Bash ships on
        # every GitHub runner image so this works on Windows too.
        shell: bash
        run: env -u CI pnpm tauri build ${{ matrix.tauri-args }}

      # Diagnostic dump: always runs so we can confirm the symbol count
      # from the macos-15-built libghostty.a made it into the final binary.
      - name: Diagnose libghostty.a symbols
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          echo "=== Downloaded libghostty.a ==="
          LIB="$HOME/ghostty-prebuilt/libghostty.a"
          if [ -f "$LIB" ]; then
            echo "Size: $(ls -lh "$LIB" | awk '{print $5}')"
            echo "Total external ghostty_ symbols: $(nm -gU "$LIB" 2>/dev/null | grep -c "_ghostty_" || echo 0)"
          else
            echo "libghostty.a not found at $HOME/ghostty-prebuilt"
          fi
          echo
          echo "=== ghostty-sys build script output (cargo:* directives) ==="
          for f in $(find target -path "*/build/ghostty-sys-*/output" -type f 2>/dev/null); do
            echo "--- $f ---"
            cat "$f"
          done

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          TAG="${{ github.ref_name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            # Tauri produces a .dmg + a .app.tar.gz/.sig pair on every
            # build now that `createUpdaterArtifacts: true` is set in
            # tauri.conf.json.  Missing artifacts are a hard failure —
            # if the updater bundle is absent here, either the bundle
            # config regressed or the TAURI_SIGNING_PRIVATE_KEY secret
            # is missing/wrong, both of which we want to know about
            # before publishing a release.
            DMG=$(find . -name "*.dmg" -path "*/release/bundle/dmg/*" | head -1)
            cp "$DMG" "release-assets/Zen-Tools-${TAG}-macos-arm64.dmg"

            APP_TAR=$(find . -name "*.app.tar.gz" -path "*/release/bundle/macos/*" | head -1)
            APP_SIG=$(find . -name "*.app.tar.gz.sig" -path "*/release/bundle/macos/*" | head -1)
            cp "$APP_TAR" "release-assets/Zen-Tools-${TAG}-macos-arm64.app.tar.gz"
            cp "$APP_SIG" "release-assets/Zen-Tools-${TAG}-macos-arm64.app.tar.gz.sig"
          fi

          if [ "${{ runner.os }}" = "Windows" ]; then
            # Tauri's NSIS bundler emits the installer as
            # `*-setup.exe` and (with createUpdaterArtifacts: true) a
            # matching `*-setup.exe.sig` minisign signature next to it.
            # Both are mandatory — a missing .sig means the updater
            # manifest in the release job can't generate the
            # `windows-x86_64` platform entry.
            EXE=$(find . -name "*-setup.exe" -path "*/release/bundle/nsis/*" | head -1)
            EXE_SIG=$(find . -name "*-setup.exe.sig" -path "*/release/bundle/nsis/*" | head -1)
            cp "$EXE" "release-assets/Zen-Tools-${TAG}-windows-x64-setup.exe"
            cp "$EXE_SIG" "release-assets/Zen-Tools-${TAG}-windows-x64-setup.exe.sig"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.name }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # Required so the default GITHUB_TOKEN can create releases.
      contents: write

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Generate updater manifest (latest.json)
        # `createUpdaterArtifacts: true` in tauri.conf.json guarantees
        # the .app.tar.gz/.sig pair is present, so missing files here
        # are a hard failure rather than a quiet skip — same reasoning
        # as the asset-stage step.
        #
        # macOS-only today. The Windows asset-stage block above is
        # gated on `runner.os == 'Windows'` and is dormant while the
        # Windows matrix row stays commented out; if/when Windows is
        # reinstated, add a `windows-x86_64` platform entry here too
        # (and stop hard-failing if its .sig is absent).
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          MAC_SIG_FILE="release-assets/Zen-Tools-${TAG}-macos-arm64.app.tar.gz.sig"
          MAC_SIG="$(cat "$MAC_SIG_FILE")"
          cat > release-assets/latest.json <<EOF
          {
            "version": "${TAG}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Zen-Tools-${TAG}-macos-arm64.app.tar.gz"
              }
            }
          }
          EOF
          echo "--- latest.json ---"
          cat release-assets/latest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # No `repository:` override — defaults to github.repository
          # (this repo).  No `token:` override — default GITHUB_TOKEN
          # has `contents: write` from the permissions block above.
          tag_name: ${{ github.ref_name }}
          name: Zen Tools ${{ github.ref_name }}
          body: |
            ## Zen Tools ${{ github.ref_name }}

            ### One-line install
            ```sh
            npx @seg4lt/zen-tools
            ```
            Pulls this release's installer for macOS, runs it, and launches the app.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Zen-Tools-${{ github.ref_name }}-macos-arm64.dmg` |

            ### macOS Installation (manual)
            1. Download the `.dmg`, open it, drag the app to `/Applications`.
            2. The app is unsigned, so first launch may be quarantined by Gatekeeper.  Clear it with:
               ```sh
               xattr -dr com.apple.quarantine "/Applications/Zen Tools.app"
               ```
          draft: false
          prerelease: false
          files: release-assets/*
