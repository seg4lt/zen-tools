[package]
name = "zen-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Zen Tools — modular developer tooling on Tauri."
default-run = "zen-tools"

[lib]
name = "zen_tools_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
zen-types = { workspace = true }
zen-parser = { workspace = true }
zen-http = { workspace = true }
zen-perf = { workspace = true }
zen-process-monitor = { workspace = true }

tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-clipboard-manager = "2"

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
ahash = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dirs = { workspace = true }
chrono = { workspace = true }
async-trait = { workspace = true }
